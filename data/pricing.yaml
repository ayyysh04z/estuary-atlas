# -----------------------------------------------------------------------------
# Estuary pricing (per https://docs.estuary.dev/getting-started/pricing/)
# Last verified: 2026-07-23
#
# When Estuary updates their pricing, edit this file — the atlas Cost tab
# reads it at request time so no code changes are needed.
# -----------------------------------------------------------------------------

currency: USD
notes: All prices in USD. Task hours are per-connector (one capture OR one materialization).

# FX rates for atlas UI toggle. Update rate when it drifts more than a few
# percent. Source and timestamp are informational — the atlas uses `rate`.
fx:
  base: USD
  rates:
    INR:
      rate: 96.84
      symbol: ₹
      source: Morningstar
      as_of: 2026-07-23T18:04:00Z

# Data movement charge
data_volume:
  price_per_gb: 0.50
  # Materializations meter the volume READ from the collection, not written to
  # the destination. Captures meter volume WRITTEN into the collection.
  applies_to: [capture_in, materialization_read]

# Task hours (i.e. active connector time)
task_hours:
  # First 6 tasks per account cost $100/month = $0.14/hour
  first_tier:
    tasks: 6
    monthly_price_per_task: 100
    hourly_price_per_task: 0.14  # 100 / 720 rounded
  # Beyond the first 6, additional tasks cost $50/month = $0.07/hour
  additional_tier:
    monthly_price_per_task: 50
    hourly_price_per_task: 0.07
  # Estuary uses 720 hours/month as the standard conversion
  hours_per_month: 720

# Free tier
free_plan:
  connectors_max: 2
  gb_per_month_max: 10

# Free trial (after free-plan limits are exceeded)
free_trial_days: 30

# Private / BYOC deployments — variable, contact sales
byoc:
  requires_annual_plan: true
  base_fee_monthly: null
  note: >
    BYOC costs depend on cloud provider, region, and dedicated management.
    Not modelled in this atlas — add a fixed monthly override per pipeline
    below under `pipeline_overrides` if you know the number.

# -----------------------------------------------------------------------------
# Ground-truth for the current tenant, taken from the actual monthly bill.
# Kept here so the atlas can sanity-check its estimates against reality.
# Update whenever a new bill arrives.
# -----------------------------------------------------------------------------
tenant_actual:
  billing_month: 2026-07
  total_due_usd: 3130.05
  data_processing_gb: 4508
  data_processing_usd: 2254.00
  task_hours_first_tier: 4464       # ≤ 4464h at $0.14/h
  task_hours_first_tier_usd: 624.96
  task_hours_additional: 3587       # > 4464h at $0.07/h
  task_hours_additional_usd: 251.09

# Per-pipeline data-volume overrides (GB/month). These are BEST-EFFORT splits
# of the tenant total based on schema breadth / event volume observations.
# Adjust individual values when you have accurate per-pipeline numbers from
# Estuary's dashboard.
pipeline_overrides:
  prod-stack:                       # ~40 collections, prod Postgres tables, highest volume
    gb_per_month: 2500
  meta-mymotor:                     # 16 hourly-refreshed Facebook insights collections
    gb_per_month: 800
  mymotor-ads:                      # 17 Google Ads reporting collections
    gb_per_month: 500
  mymotor-ct-events:                # legacy CleverTap CSV pipeline, chatty
    gb_per_month: 250
  mymotor-ct-events-v2:             # curated CleverTap events, similar volume
    gb_per_month: 250
  ev-hub:                           # EV Postgres capture, medium volume
    gb_per_month: 100
  ev-billing:                       # EV billing Postgres capture, small
    gb_per_month: 50
  mymotor-db:                       # mymotor product DB, small
    gb_per_month: 58
  # ─── check: sum of the above = 4508 GB, matches billing total ─────────────
